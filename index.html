<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soulmask 才能検索 | 日本語対応表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:        #0e0c0a;
    --surface:   #17140f;
    --card:      #1f1a13;
    --border:    #3a2f1e;
    --gold:      #c8922a;
    --gold-dim:  #7a5718;
    --amber:     #e8a84a;
    --text:      #d4c4a0;
    --text-dim:  #7a6a50;
    --green:     #4a8c5c;
    --blue:      #3a6a9c;
    --purple:    #7a4a9c;
    --orange:    #b86a2a;
    --red:       #9c3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── ヘッダー ── */
  header {
    background: linear-gradient(180deg, #1a1208 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .site-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 4vw, 32px);
    color: var(--amber);
    letter-spacing: 0.12em;
    text-shadow: 0 0 20px rgba(200,146,42,0.4);
  }
  .site-sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  /* ── メインレイアウト ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* ── 検索・フィルターバー ── */
  .search-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-dim); }

  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--amber); }

  /* ── 統計バー ── */
  .stats-bar {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-bar span { color: var(--amber); font-weight: 700; }

  /* ── テーブル ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
  }
  thead tr {
    background: var(--card);
    border-bottom: 1px solid var(--gold-dim);
  }
  th {
    color: var(--gold);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--amber); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid #1e1810;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--card); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 10px 14px;
    vertical-align: top;
  }

  .td-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .td-en {
    font-weight: 500;
    color: var(--text);
    min-width: 160px;
  }
  .td-ja {
    color: var(--amber);
    font-weight: 500;
    min-width: 120px;
  }
  .td-ja.empty { color: var(--text-dim); font-style: italic; }
  .td-effect { color: var(--text-dim); font-size: 13px; max-width: 320px; }
  .td-cat { white-space: nowrap; }

  /* 編集 */
  .ja-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--gold-dim);
    color: var(--amber);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    min-width: 100px;
    outline: none;
    padding: 2px 4px;
    transition: border-color 0.15s;
  }
  .ja-input:focus { border-bottom-color: var(--gold); background: rgba(200,146,42,0.06); }
  .ja-input::placeholder { color: var(--text-dim); font-weight: 400; font-size: 12px; }

  /* カテゴリバッジ */
  .badge {
    border-radius: 4px;
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 7px;
  }
  .badge-combat   { background: rgba(154,58,58,0.25); color: #e08080; border: 1px solid rgba(154,58,58,0.4); }
  .badge-survival { background: rgba(74,140,92,0.2); color: #7ecf96; border: 1px solid rgba(74,140,92,0.35); }
  .badge-speed    { background: rgba(58,106,156,0.2); color: #7aaee0; border: 1px solid rgba(58,106,156,0.35); }
  .badge-craft    { background: rgba(122,74,156,0.2); color: #c088e0; border: 1px solid rgba(122,74,156,0.35); }
  .badge-tribe    { background: rgba(184,106,42,0.2); color: #e0aa70; border: 1px solid rgba(184,106,42,0.35); }
  .badge-utility  { background: rgba(80,80,80,0.25); color: #a0a090; border: 1px solid rgba(80,80,80,0.4); }
  .badge-title    { background: rgba(200,146,42,0.2); color: var(--amber); border: 1px solid rgba(200,146,42,0.4); }
  .badge-negative { background: rgba(40,30,20,0.5); color: #808070; border: 1px solid #3a3020; }

  /* ソース表示 */
  .source-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── アクションバー ── */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .btn-primary {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--amber);
    font-weight: 700;
  }
  .btn-primary:hover { background: #8a6520; }

  /* ── 空状態 ── */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── ヒント ── */
  .hint {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-dim);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 16px;
    padding: 10px 14px;
  }

  /* ── トースト ── */
  #toast {
    background: var(--gold-dim);
    border-radius: 6px;
    bottom: 24px;
    color: var(--amber);
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    padding: 10px 20px;
    pointer-events: none;
    position: fixed;
    right: 24px;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }

  /* ── レスポンシブ ── */
  @media (max-width: 600px) {
    td, th { padding: 8px 10px; }
    .td-effect { display: none; }
  }
</style>
</head>

</div>

const CAT_LABELS = {
  combat:   { label:'戦闘・攻撃',  cls:'badge-combat' },
  survival: { label:'生存・回復',  cls:'badge-survival' },
  speed:    { label:'速度・共鳴',  cls:'badge-speed' },
  craft:    { label:'職人・制作',  cls:'badge-craft' },
  tribe:    { label:'部族固有',    cls:'badge-tribe' },
  utility:  { label:'汎用',        cls:'badge-utility' },
  title:    { label:'称号才能',    cls:'badge-title' },
  negative: { label:'ネガティブ',  cls:'badge-negative' },
};

// ── 状態 ──────────────────────────────────────────────────
let data = TALENTS.map(t => ({ ...t }));
let filterCat = 'all';
let sortCol = 'id';
let sortDir = 1;
let searchQ = '';

// ── LocalStorage ──────────────────────────────────────────
const LS_KEY = 'soulmask_ja_v1';
function applyJaMap(map) {
  data.forEach(t => { if (map[t.id]?.ja) t.ja = map[t.id].ja; });
}
function loadLocal() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    data.forEach(t => { if (saved[t.id]) t.ja = saved[t.id]; });
  } catch {}
}
function saveOne(id, val) {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    saved[id] = val;
    localStorage.setItem(LS_KEY, JSON.stringify(saved));
  } catch {}
}

// ── フィルターボタン ───────────────────────────────────────
function buildFilters() {
  const fg = document.getElementById('filterGroup');
  const cats = ['all', ...Object.keys(CAT_LABELS)];
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (c === 'all' ? ' active' : '');
    b.textContent = c === 'all' ? 'すべて' : CAT_LABELS[c].label;
    b.dataset.cat = c;
    b.addEventListener('click', () => {
      filterCat = c;
      document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    });
    fg.appendChild(b);
  });
}

// ── ソート ─────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('th[data-col]').forEach(x => x.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↑' : '↓';
    render();
  });
});

// ── 検索 ───────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  render();
});

// ── レンダリング ────────────────────────────────────────────
function render() {
  let rows = data.filter(t => {
    if (filterCat !== 'all' && t.cat !== filterCat) return false;
    if (!searchQ) return true;
    return (
      t.id.includes(searchQ) ||
      t.en.toLowerCase().includes(searchQ) ||
      t.ja.toLowerCase().includes(searchQ) ||
      t.effect.toLowerCase().includes(searchQ)
    );
  });

  rows.sort((a, b) => {
    const av = a[sortCol] || '';
    const bv = b[sortCol] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const empty = document.getElementById('emptyState');

  if (rows.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    rows.forEach(t => {
      const cat = CAT_LABELS[t.cat] || { label: t.cat, cls: 'badge-utility' };
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-id">${t.id}</td>
        <td class="td-en">${esc(t.en)}</td>
        <td class="td-ja">
          <input class="ja-input" data-id="${t.id}" placeholder="日本語名を入力..." value="${esc(t.ja)}" type="text">
        </td>
        <td class="td-effect">${esc(t.effect)}</td>
        <td class="td-cat"><span class="badge ${cat.cls}">${cat.label}</span></td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('.ja-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const id = e.target.dataset.id;
        const val = e.target.value;
        const t = data.find(x => x.id === id);
        if (t) { t.ja = val; saveOne(id, val); }
      });
    });
  }

  const total = data.length;
  const shown = rows.length;
  const filled = data.filter(t => t.ja.trim()).length;
  document.getElementById('statsBar').innerHTML =
    `表示: <span>${shown}</span> / ${total}件　　日本語名登録済み: <span>${filled}</span> / ${total}件`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── エクスポート ────────────────────────────────────────────
function exportData() {
  const out = {};
  data.forEach(t => { if (t.ja) out[t.id] = { en: t.en, ja: t.ja }; });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'soulmask_talent_ja.json';
  a.click();
  toast('エクスポートしました ✓');
}

// ── インポート ──────────────────────────────────────────────
function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const obj = JSON.parse(ev.target.result);
        let count = 0;
        data.forEach(t => {
          if (obj[t.id]?.ja) { t.ja = obj[t.id].ja; saveOne(t.id, t.ja); count++; }
        });
        render();
        toast(`${count}件インポートしました ✓`);
      } catch { toast('JSONの読み込みに失敗しました'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── リセット ────────────────────────────────────────────────
function clearAll() {
  if (!confirm('入力した日本語名をすべてリセットしますか？')) return;
  localStorage.removeItem(LS_KEY);
  data.forEach(t => t.ja = '');
  render();
  toast('リセットしました');
}

// ── トースト ────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 初期化 ──────────────────────────────────────────────────
buildFilters();
(async () => {
  try {
    const res = await fetch('./talent_ja.json');
    if (res.ok) {
      const shared = await res.json();
      applyJaMap(shared);
      toast('共有データを読み込みました ✓');
    }
  } catch {}
  loadLocal();
  render();
})();
</script>
